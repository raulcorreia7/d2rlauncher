name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BINARY_NAME: d2rlauncher

jobs:
  prepare:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libxft-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [[ -z "$version" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi

          if [[ "$cargo_version" != "$version" ]]; then
            echo "Cargo.toml version ($cargo_version) does not match release version ($version)." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "release_name=D2R Launcher v$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" > /dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.tag }} already exists."
            exit 0
          fi

          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.release_name }}" \
            --target "${{ github.sha }}" \
            --generate-notes

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: i686-pc-windows-msvc
            platform: windows-x86
            archive_extension: zip
            binary_name: d2rlauncher.exe
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            archive_extension: zip
            binary_name: d2rlauncher.exe
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            archive_extension: tar.gz
            binary_name: d2rlauncher
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x64
            archive_extension: tar.gz
            binary_name: d2rlauncher
          - runner: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            archive_extension: tar.gz
            binary_name: d2rlauncher
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libxft-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          archive_base="${{ env.BINARY_NAME }}-${version}-${{ matrix.platform }}"
          binary_dir="target/${{ matrix.target }}/release"

          mkdir -p dist
          tar -czf "dist/${archive_base}.tar.gz" -C "$binary_dir" "${{ matrix.binary_name }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $archiveBase = "${{ env.BINARY_NAME }}-$version-${{ matrix.platform }}"
          $binaryPath = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $binaryPath -DestinationPath "dist/$archiveBase.zip" -Force

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          asset="dist/${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.${{ matrix.archive_extension }}"
          gh release upload "${{ needs.prepare.outputs.tag }}" "$asset" --clobber
